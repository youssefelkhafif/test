name: Evaluate Laravel Submission

on:
  workflow_dispatch:
    inputs:
      submission_id:
        description: "Submission ID from Laravel platform"
        required: true
        type: string
      exercise_slug:
        description: "Exercise slug"
        required: true
        type: string
      test_suite:
        description: "Hidden test suite key"
        required: true
        type: string
      student_branch:
        description: "Student branch name"
        required: true
        type: string

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout submitted branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.student_branch }}

      - name: Create result file
        run: |
          mkdir -p evaluation-results

          cat > evaluation-results/result.json <<EOF
          {
            "submission_id": "${{ inputs.submission_id }}",
            "exercise_slug": "${{ inputs.exercise_slug }}",
            "test_suite": "${{ inputs.test_suite }}",
            "student_branch": "${{ inputs.student_branch }}",
            "status": "workflow_started",
            "message": "GitHub Actions workflow triggered successfully."
          }
          EOF

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-result-${{ inputs.submission_id }}
          path: evaluation-results/result.json