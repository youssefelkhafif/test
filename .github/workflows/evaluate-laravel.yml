name: Evaluate Laravel Submission

on:
  workflow_dispatch:
    inputs:
      submission_id:
        description: "Submission ID from Laravel platform"
        required: true
        type: string
      exercise_slug:
        description: "Exercise slug"
        required: true
        type: string
      test_suite:
        description: "Hidden test suite key"
        required: true
        type: string
      student_branch:
        description: "Student branch name"
        required: true
        type: string

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout submitted branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.student_branch }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3
          coverage: none

      - name: Run Laravel evaluation and always create result
        id: evaluation
        shell: bash
        env:
          SUBMISSION_ID: ${{ inputs.submission_id }}
          EXERCISE_SLUG: ${{ inputs.exercise_slug }}
          TEST_SUITE: ${{ inputs.test_suite }}
          STUDENT_BRANCH: ${{ inputs.student_branch }}
        run: |
          mkdir -p evaluation-results

          STATUS="failed"
          SCORE=0
          MESSAGE="Evaluation did not finish."

          echo "Starting evaluation..." > evaluation-results/full-output.txt

          set +e

          if [ ! -f composer.json ]; then
            MESSAGE="composer.json not found. The submitted branch does not look like a Laravel project."
          else
            echo ">>> Installing Composer dependencies" >> evaluation-results/full-output.txt
            composer install --no-interaction --prefer-dist --no-progress >> evaluation-results/full-output.txt 2>&1
            INSTALL_EXIT=$?

            if [ "$INSTALL_EXIT" -ne 0 ]; then
              MESSAGE="Composer install failed."
            else
              mkdir -p database
              touch database/database.sqlite

              cat > .env <<EOF
          APP_NAME=Laravel
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost

          DB_CONNECTION=sqlite
          DB_DATABASE=${{ github.workspace }}/database/database.sqlite

          CACHE_STORE=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          EOF

              echo ">>> Generating app key" >> evaluation-results/full-output.txt
              php artisan key:generate --force >> evaluation-results/full-output.txt 2>&1
              KEY_EXIT=$?

              echo ">>> Clearing config" >> evaluation-results/full-output.txt
              php artisan config:clear >> evaluation-results/full-output.txt 2>&1
              CONFIG_EXIT=$?

              echo ">>> Running migrations" >> evaluation-results/full-output.txt
              php artisan migrate --force >> evaluation-results/full-output.txt 2>&1
              MIGRATE_EXIT=$?

              if [ "$KEY_EXIT" -ne 0 ] || [ "$CONFIG_EXIT" -ne 0 ] || [ "$MIGRATE_EXIT" -ne 0 ]; then
                MESSAGE="Laravel setup or migrations failed."
              else
                mkdir -p tests/Feature/Hidden

                cat > tests/Feature/Hidden/PostsCrudHiddenTest.php <<'PHP'
          <?php

          namespace Tests\Feature\Hidden;

          use Illuminate\Foundation\Testing\RefreshDatabase;
          use Illuminate\Support\Facades\DB;
          use Illuminate\Support\Facades\Route;
          use Illuminate\Support\Facades\Schema;
          use Tests\TestCase;

          class PostsCrudHiddenTest extends TestCase
          {
              use RefreshDatabase;

              public function test_posts_table_and_resource_routes_exist(): void
              {
                  $this->assertTrue(Schema::hasTable('posts'), 'The posts table does not exist.');

                  $expectedRoutes = [
                      'posts.index',
                      'posts.create',
                      'posts.store',
                      'posts.show',
                      'posts.edit',
                      'posts.update',
                      'posts.destroy',
                  ];

                  foreach ($expectedRoutes as $routeName) {
                      $this->assertTrue(
                          Route::has($routeName),
                          "Missing route name: {$routeName}. Use Route::resource('posts', PostController::class)."
                      );
                  }
              }

              public function test_post_validation_requires_title_and_content(): void
              {
                  $response = $this
                      ->from('/posts/create')
                      ->post('/posts', [
                          'title' => '',
                          'content' => '',
                      ]);

                  $response->assertSessionHasErrors(['title', 'content']);
              }

              public function test_post_can_be_created_updated_and_deleted(): void
              {
                  $createResponse = $this->post('/posts', [
                      'title' => 'Hidden Test Title',
                      'content' => 'Hidden test content.',
                  ]);

                  $this->assertContains($createResponse->getStatusCode(), [200, 201, 302]);

                  $this->assertDatabaseHas('posts', [
                      'title' => 'Hidden Test Title',
                      'content' => 'Hidden test content.',
                  ]);

                  $postId = DB::table('posts')
                      ->where('title', 'Hidden Test Title')
                      ->value('id');

                  $this->assertNotNull($postId, 'The created post id was not found.');

                  $updateResponse = $this->put('/posts/'.$postId, [
                      'title' => 'Updated Hidden Test Title',
                      'content' => 'Updated hidden test content.',
                  ]);

                  $this->assertContains($updateResponse->getStatusCode(), [200, 201, 302]);

                  $this->assertDatabaseHas('posts', [
                      'id' => $postId,
                      'title' => 'Updated Hidden Test Title',
                      'content' => 'Updated hidden test content.',
                  ]);

                  $deleteResponse = $this->delete('/posts/'.$postId);

                  $this->assertContains($deleteResponse->getStatusCode(), [200, 204, 302]);

                  $this->assertDatabaseMissing('posts', [
                      'id' => $postId,
                  ]);
              }
          }
          PHP

                echo ">>> Running hidden tests" >> evaluation-results/full-output.txt
                php artisan test --filter=PostsCrudHiddenTest --colors=never >> evaluation-results/full-output.txt 2>&1
                TEST_EXIT=$?

                if [ "$TEST_EXIT" -eq 0 ]; then
                  STATUS="passed"
                  SCORE=100
                  MESSAGE="Hidden Laravel Posts CRUD tests passed."
                else
                  STATUS="failed"
                  SCORE=0
                  MESSAGE="Hidden Laravel Posts CRUD tests failed."
                fi
              fi
            fi
          fi

          export EVAL_STATUS="$STATUS"
          export EVAL_SCORE="$SCORE"
          export EVAL_MESSAGE="$MESSAGE"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          output_path = Path("evaluation-results/full-output.txt")
          output = output_path.read_text(errors="replace") if output_path.exists() else ""

          data = {
              "submission_id": os.environ.get("SUBMISSION_ID"),
              "exercise_slug": os.environ.get("EXERCISE_SLUG"),
              "test_suite": os.environ.get("TEST_SUITE"),
              "student_branch": os.environ.get("STUDENT_BRANCH"),
              "status": os.environ.get("EVAL_STATUS", "failed"),
              "score": int(os.environ.get("EVAL_SCORE", "0")),
              "message": os.environ.get("EVAL_MESSAGE", "Evaluation failed."),
              "output": output[-12000:]
          }

          Path("evaluation-results/result.json").write_text(json.dumps(data, indent=2))
          PY

          echo "eval_status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-result-${{ inputs.submission_id }}
          path: |
            evaluation-results/result.json
            evaluation-results/full-output.txt

      - name: Fail workflow if evaluation failed
        if: steps.evaluation.outputs.eval_status != 'passed'
        run: exit 1